<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | Contact form</title>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div class="form-container">
    <h1>Contact Us</h1>
    <form id="contactForm" novalidate>
      <div class="grid-row">
        <div class="input-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input type="text" id="firstName" name="firstName">
          <span class="error-message" id="firstNameError">This field is required</span>
        </div>
        <div class="input-group">
          <label for="lastName">Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" name="lastName">
          <span class="error-message" id="lastNameError">This field is required</span>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email">
        <span class="error-message" id="emailError">Please enter a valid email address</span>
      </div>

      <div class="input-group">
        <label>Query Type <span class="required">*</span></label>
        <div class="radio-grid">
          <label class="custom-radio">
            <input type="radio" name="queryType" value="general">
            <span class="radio-control"></span>
            General Enquiry
          </label>
          <label class="custom-radio">
            <input type="radio" name="queryType" value="support">
            <span class="radio-control"></span>
            Support Request
          </label>
        </div>
        <span class="error-message" id="queryTypeError">Please select a query type</span>
      </div>

      <div class="input-group">
        <label for="message">Message <span class="required">*</span></label>
        <textarea id="message" name="message" rows="4"></textarea>
        <span class="error-message" id="messageError">This field is required</span>
      </div>

      <div class="input-group consent-container">
        <label class="custom-checkbox">
          <input type="checkbox" id="consent">
          <span class="checkbox-control"></span>
          I consent to being contacted by the team <span class="required">*</span>
        </label>
        <span class="error-message" id="consentError">To submit this form, please consent to being contacted</span>
      </div>

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">sage Kabidu</a>.
  </footer>
</body>

</html>
